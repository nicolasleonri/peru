name: Deploy App to CF Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - qa
          - prod

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout peru (this repo)
        uses: actions/checkout@v4

      - name: Clone electometro-app
        uses: actions/checkout@v4
        with:
          repository: electometro-org/app
          path: electometro
          token: '${{ secrets.GH_ORG_TOKEN }}'

      - name: Clone cf-workers
        uses: actions/checkout@v4
        with:
          repository: electometro-org/cf-workers
          path: cf-workers
          token: '${{ secrets.GH_ORG_TOKEN }}'

      - name: Setup app directories
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          cd electometro

          # Remove existing symlinks
          rm -f public wrangler

          # Copy public assets from peru repo
          cp -r ../app/public ./public
          
          # Copy i18n assets from peru repo
          cp -r ../app/i18n ./i18n

          # Copy wrangler config from cf-workers
          cp -r ../cf-workers/peru_2026/wrangler ./wrangler
          echo $APP_ENV_FILE | base64 --decode > .env

      - name: Replace QA placeholder in _headers
        if: inputs.environment == 'qa'
        env:
          QA_DOMAIN: ${{ secrets.QA_DOMAIN }}
        run: |
          sed -i "s/placeholder\.com/$QA_DOMAIN/g" electometro/public/static/_headers

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electometro/package-lock.json

      - name: Install dependencies
        working-directory: electometro
        run: npm ci

      - name: Build
        working-directory: electometro
        run: VITE_ELECTION_ID=peru_2026 npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: electometro
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ENV: ${{ inputs.environment == 'qa' && 'qa' || '' }}
        run: |
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }} CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} CLOUDFLARE_ENV=$CLOUDFLARE_ENV npm run deploy