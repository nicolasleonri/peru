name: Pull PROD Translations

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout for translation updates'
        required: false
        type: string

permissions:
  contents: write

jobs:
  pull-prod:
    runs-on: ubuntu-latest
    name: Pull PROD Translations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      - name: Pull PROD translations from Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY_APP: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          mkdir -p app/i18n
          tolgee pull --path app/i18n --languages es --languages qu --languages ay --api-url $TOLGEE_API_URL --api-key $TOLGEE_API_KEY_APP

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/i18n
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "chore: update PROD translations from Tolgee (shouldn't happen unless necessary)"
            git push
          fi
