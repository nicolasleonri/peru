name: Release PROD

on:
  workflow_dispatch:
    inputs:
      upload_data:
        description: 'Upload latest data JSONs to production bucket?'
        required: true
        type: choice
        default: 'yes'
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

concurrency:
  group: release-prod
  cancel-in-progress: true

jobs:
  upload-data:
    if: inputs.upload_data == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release.yml in electometro-org.github.io (production mode)
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
        run: |
          echo "Triggering data upload to production bucket..."
          gh workflow run release.yml \
            --repo electometro-org/electometro-org.github.io \
            --field environment=production
          echo "Waiting for workflow to complete..."
          sleep 10
          # Wait for the workflow to complete (timeout after 5 minutes)
          for i in {1..30}; do
            STATUS=$(gh run list --repo electometro-org/electometro-org.github.io --workflow=release.yml --limit=1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo electometro-org/electometro-org.github.io --workflow=release.yml --limit=1 --json conclusion --jq '.[0].conclusion')
              if [ "$CONCLUSION" = "success" ]; then
                echo "Data upload completed successfully"
                break
              else
                echo "Data upload failed with conclusion: $CONCLUSION"
                exit 1
              fi
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done

  deploy-app:
    needs: [upload-data]
    if: always() && (needs.upload-data.result == 'success' || needs.upload-data.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy-app.yml (production mode)
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
        run: |
          echo "Triggering app deployment to production..."
          gh workflow run deploy-app.yml \
            --repo electometro-org/peru \
            --field environment=prod
          echo "Waiting for deployment to start..."
          sleep 10
          # Wait for the workflow to complete (timeout after 10 minutes)
          for i in {1..60}; do
            STATUS=$(gh run list --repo electometro-org/peru --workflow=deploy-app.yml --limit=1 --json status --jq '.[0].status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run list --repo electometro-org/peru --workflow=deploy-app.yml --limit=1 --json conclusion --jq '.[0].conclusion')
              if [ "$CONCLUSION" = "success" ]; then
                echo "App deployment completed successfully"
                break
              else
                echo "App deployment failed with conclusion: $CONCLUSION"
                exit 1
              fi
            fi
            echo "Waiting... ($i/60)"
            sleep 10
          done

  pull-translations:
    needs: [deploy-app]
    if: always() && needs.deploy-app.result == 'success'
    uses: ./.github/workflows/pull-qa-translations.yml
    with:
      ref: ${{ github.ref_name }}
    secrets: inherit

  promote-to-production:
    needs: [pull-translations]
    if: always() && needs.pull-translations.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run promote script
        run: python app/scripts/promote_i18n_qa_to_production.py

      - name: Extract production version
        id: version
        run: |
          PROD_VERSION=$(python -c "import json; print(json.load(open('app/i18n/es.json'))['data']['version']['production'])")
          echo "prod_version=$PROD_VERSION" >> $GITHUB_OUTPUT
          echo "Production version: $PROD_VERSION"

      - name: Check for manual edits
        id: manual_edits
        run: |
          EDIT_COUNT=$(python -c "import json; d=json.load(open('app/i18n/manual_edits.json')); print(len(d.get('qu',[])) + len(d.get('ay',[])))")
          echo "count=$EDIT_COUNT" >> $GITHUB_OUTPUT
          echo "Manual edits detected: $EDIT_COUNT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      - name: Push production translations to Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          mkdir -p app/i18n-upload
          cp app/i18n/*.json app/i18n-upload/
          cd app/i18n-upload
          rm *-qa.json
          npx @tolgee/cli push \
            --files-template '{languageTag}.{extension}' \
            --force-mode OVERRIDE \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY

      - name: Tag production keys in Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          # First, delete the old tags
          npx @tolgee/cli tag \
            --extractor ./app/scripts/tolgee-extractor.js \
            --patterns 'app/i18n/es.json' \
            --filter-extracted \
            --untag 'prod-v*' \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY

          # Then add the correct one
          npx @tolgee/cli tag \
            --extractor ./app/scripts/tolgee-extractor.js \
            --patterns 'app/i18n/es.json' \
            --filter-extracted \
            --tag 'prod-v${{ steps.version.outputs.prod_version }}' \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY

      - name: Tag manual edits in Tolgee
        if: steps.manual_edits.outputs.count != '0'
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          echo "Tagging ${{ steps.manual_edits.outputs.count }} keys with manual-edit-detected"
          npx @tolgee/cli tag \
            --extractor ./app/scripts/tolgee-extractor-manual-edits.js \
            --patterns 'app/i18n/manual_edits.json' \
            --filter-extracted \
            --tag 'manual-edit-detected' \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/i18n/es.json
          git commit -m "Release Production: Promote QA to production (v${{ steps.version.outputs.prod_version }})" || true
          git push

      - name: Cleanup manual edits file
        run: rm -f app/i18n/manual_edits.json

      - name: Publish to CDN
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          curl -L -X POST "${TOLGEE_API_URL}/v2/projects/34/content-delivery-configs/1" \
            -H "X-API-Key: ${TOLGEE_API_KEY}"
