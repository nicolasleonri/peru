name: Pull QA Translations

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  pull-qa:
    runs-on: ubuntu-latest
    name: Pull QA Translations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      - name: Pull QA translations from Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY_HOME: ${{ secrets.TOLGEE_API_KEY_HOME }}
          TOLGEE_API_KEY_APP: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          mkdir -p app/i18n
          tolgee pull --path app/i18n --languages es-qa --languages qu-qa --languages ay-qa --api-url $TOLGEE_API_URL --api-key $TOLGEE_API_KEY_APP
          # mkdir -p home/i18n
          # tolgee pull --path home/i18n --languages es-qa,qu-qa,ay-qa --api-url $TOLGEE_API_URL --api-key $TOLGEE_API_KEY_HOME

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/i18n
          git add home/i18n
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "chore: update QA translations from Tolgee"
            git push
          fi