name: Back up i18n files

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Backup Translations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      - name: Pull translations from Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
          TOLGEE_PROJECT_ID: ${{ secrets.TOLGEE_PROJECT_ID }}
        run: |
          mkdir -p app/i18n
          tolgee pull --path app/i18n --api-url $TOLGEE_API_URL --api-key $TOLGEE_API_KEY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/i18n
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "chore: update i18n translations"
            git push
          fi