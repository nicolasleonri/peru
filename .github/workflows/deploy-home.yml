name: Deploy Home to CF Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - qa
          - prod

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: home/package-lock.json

      - name: Install dependencies
        working-directory: home
        run: npm ci

      - name: Load Env Variables
        env:
          HOMEPAGE_ENV_FILE: ${{ secrets.HOMEPAGE_ENV_FILE }}
        working-directory: home
        run: |
          echo HOMEPAGE_ENV_FILE | base64 --decode > .env

      - name: Replace QA placeholder in _headers and wrangler.toml
        if: inputs.environment == 'qa'
        env:
          QA_DOMAIN: ${{ secrets.QA_DOMAIN }}
        run: |
          sed -i "s/placeholder\.com/$QA_DOMAIN/g" home/public/_headers
          sed -i "s/placeholder\.com/$QA_DOMAIN/g" home/wrangler.toml

      - name: Build and Deploy to Cloudflare Workers
        working-directory: home
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ "${{ inputs.environment }}" = "qa" ]; then
            npm run deploy-qa > /dev/null 2>&1
          else
            npm run deploy
          fi