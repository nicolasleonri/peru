name: Deploy Home to CF Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: home/package-lock.json

      - name: Install dependencies
        working-directory: home
        run: npm ci

      - name: Load Env Variables
        env:
          QA_ENV_FILE: ${{ secrets.HOMEPAGE_ENV_FILE }}
        working-directory: home
        run:
          # Parse env file
          echo $QA_ENV_FILE | base64 --decode > .env

      - name: Build and Deploy to Cloudflare Workers
        working-directory: home
        run: CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }} CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} npm run deploy
