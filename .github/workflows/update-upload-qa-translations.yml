name: Update QA Translations from Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-qa-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout peru-assets (this repo)
        uses: actions/checkout@v4

      - name: Clone electometro-org.github.io (data repo)
        uses: actions/checkout@v4
        with:
          repository: electometro-org/electometro-org.github.io
          path: electometro-data
          token: '${{ secrets.GH_ORG_TOKEN }}'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run merge script
        run: python app/scripts/merge_i18n_keys_from_json_with_qa.py

      - name: Extract QA version
        id: version
        run: |
          QA_VERSION=$(python -c "import json; print(json.load(open('app/i18n/es-qa.json'))['data']['version']['qa'])")
          echo "qa_version=$QA_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted QA version: $QA_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      - name: Push translations to Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          mkdir -p app/i18n-upload
          cp app/i18n/*-qa.json app/i18n-upload/
          cd app/i18n-upload
          npx @tolgee/cli push \
            --files-template '{languageTag}.{extension}' \
            --force-mode OVERRIDE \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY

      - name: Tag keys in Tolgee
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
        run: |
          # First, delete the tag
          npx @tolgee/cli tag \
            --extractor ./app/scripts/tolgee-extractor.js \
            --patterns * \
            --filter-extracted \
            --untag 'qa-v*' \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY
          
          # Then add the correct one
          npx @tolgee/cli tag \
            --extractor ./app/scripts/tolgee-extractor.js \
            --patterns * \
            --filter-extracted \
            --tag 'qa-v${{ steps.version.outputs.qa_version }}' \
            --api-url $TOLGEE_API_URL \
            --api-key $TOLGEE_API_KEY

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/i18n/es-qa.json
          git commit -m "Update QA translations from data" || true
          git push

      - name: Publish to CDN
        env:
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY_APP }}
#          TOLGEE_PROJECT_ID: ${{ secrets.TOLGEE_PROJECT_ID_APP }}
#          TOLGEE_CDN_CONFIG_ID: ${{ secrets.TOLGEE_CDN_CONFIG_ID_APP }}
        run: |
          curl -L -X POST "${TOLGEE_API_URL}/v2/projects/34/content-delivery-configs/1" \
            -H "X-API-Key: ${TOLGEE_API_KEY}"
